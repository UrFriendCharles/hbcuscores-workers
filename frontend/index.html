<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HBCUscores — HBCU Sports Scores & Standings</title>
  <meta name="description" content="Live scores, standings, and game recaps for HBCU athletics — MEAC, SWAC, CIAA, SIAC." />
  <style>
    /* ─── Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --accent: #c8a84b;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 8px;
      --font: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    /* ─── Header ───────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--accent);
    }

    .logo span { color: var(--text); }

    nav { display: flex; gap: 1rem; flex-wrap: wrap; }

    nav button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.4rem 0.85rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
    }

    nav button:hover,
    nav button.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ─── Filters ──────────────────────────────────────────── */
    .filters {
      padding: 1rem 1.5rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }

    .filters select, .filters button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.45rem 0.85rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.875rem;
    }

    .filters button.primary {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
    }

    /* ─── Main Content ─────────────────────────────────────── */
    main { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }

    h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; color: var(--accent); }

    /* ─── Scores Grid ──────────────────────────────────────── */
    .scores-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    .game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      transition: border-color 0.15s;
    }

    .game-card:hover { border-color: var(--accent); }

    .game-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.6rem;
      display: flex;
      justify-content: space-between;
    }

    .teams { display: flex; flex-direction: column; gap: 0.4rem; }

    .team-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .team-name { font-size: 0.95rem; font-weight: 600; }
    .team-name.winner { color: var(--accent); }

    .team-score { font-size: 1.1rem; font-weight: 700; }

    .recap-btn {
      margin-top: 0.75rem;
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.35rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.15s;
    }

    .recap-btn:hover { border-color: var(--accent); color: var(--accent); }

    .recap-text {
      margin-top: 0.75rem;
      font-size: 0.82rem;
      line-height: 1.55;
      color: #ccc;
      border-top: 1px solid var(--border);
      padding-top: 0.75rem;
    }

    /* ─── Status Badges ────────────────────────────────────── */
    .badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .badge.live    { background: #c0392b; color: #fff; }
    .badge.final   { background: #2e2e2e; color: #888; }
    .badge.upcoming { background: #1a3a5c; color: #7eb8f7; }

    /* ─── Standings Table ──────────────────────────────────── */
    .standings-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead th {
      text-align: left;
      padding: 0.6rem 0.75rem;
      border-bottom: 2px solid var(--accent);
      color: var(--muted);
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:hover { background: rgba(255,255,255,0.03); }

    tbody td { padding: 0.6rem 0.75rem; }

    .conf-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    /* ─── Loading / Empty States ───────────────────────────── */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Footer ───────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }

    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">HBCU<span>scores</span></div>
  <nav>
    <button class="active" onclick="setView('scores', this)">Scores</button>
    <button onclick="setView('standings', this)">Standings</button>
    <button onclick="setView('brackets', this)">Brackets</button>
  </nav>
</header>

<div class="filters">
  <select id="sportSelect" onchange="loadData()">
    <option value="basketball-men">Men's Basketball</option>
    <option value="basketball-women">Women's Basketball</option>
    <option value="football">Football</option>
  </select>
  <select id="confSelect" onchange="loadData()">
    <option value="">All Conferences</option>
    <option value="meac">MEAC</option>
    <option value="swac">SWAC</option>
    <option value="ciaa">CIAA</option>
    <option value="siac">SIAC</option>
  </select>
  <select id="divSelect" onchange="loadData()">
    <option value="d1">Division I</option>
    <option value="d2">Division II</option>
  </select>
  <button class="primary" onclick="loadData()">Refresh</button>
</div>

<main id="mainContent">
  <div class="empty"><span class="spinner"></span></div>
</main>

<footer>
  &copy; 2026 <a href="https://hbcuscores.com">hbcuscores.com</a> — Celebrating HBCU Athletics
  <br><small>Scores via NCAA API · AI recaps by Gemini · Powered by Cloudflare Workers</small>
</footer>

<script>
  // ─── Config ────────────────────────────────────────────────────────────────
  // Worker URL — update this if your worker subdomain changes
  const API_BASE = 'https://hbcuscores-api.urfriendcharles.workers.dev';

  let currentView = 'scores';

  // ─── View Switcher ──────────────────────────────────────────────────────────
  function setView(view, btn) {
    currentView = view;
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadData();
  }

  // ─── Main Data Loader ───────────────────────────────────────────────────────
  async function loadData() {
    const sport = document.getElementById('sportSelect').value;
    const conf  = document.getElementById('confSelect').value;
    const div   = document.getElementById('divSelect').value;
    const main  = document.getElementById('mainContent');

    main.innerHTML = '<div class="empty"><span class="spinner"></span></div>';

    try {
      if (currentView === 'scores') {
        await loadScores(main, sport, conf, div);
      } else if (currentView === 'standings') {
        await loadStandings(main, sport, div);
      } else {
        main.innerHTML = '<div class="empty">Bracket view coming soon.</div>';
      }
    } catch (err) {
      main.innerHTML = `<div class="empty">Failed to load data.<br><small>${err.message}</small></div>`;
    }
  }

  // ─── Scores ─────────────────────────────────────────────────────────────────
  async function loadScores(main, sport, conf, div) {
    const params = new URLSearchParams({ sport, div });
    const res  = await fetch(`${API_BASE}/api/scores?${params}`);
    const data = await res.json();

    let games = data.games || [];
    if (conf) games = games.filter(g =>
      (g.conference || '').toLowerCase() === conf
    );

    if (games.length === 0) {
      main.innerHTML = '<div class="empty">No games found for the selected filters.</div>';
      return;
    }

    const html = `
      <h2>${games.length} Game${games.length !== 1 ? 's' : ''} · ${formatSport(sport)}</h2>
      <div class="scores-grid">
        ${games.map(g => renderGameCard(g)).join('')}
      </div>
    `;
    main.innerHTML = html;
  }

  function renderGameCard(g) {
    const awayWon = g.away_winner;
    const homeWon = g.home_winner;
    const isFinal = /final|F$/i.test(g.status || '');
    const isLive  = /progress|live|[1-2]H|OT/i.test(g.status || '');

    const badge = isFinal
      ? '<span class="badge final">Final</span>'
      : isLive
        ? '<span class="badge live">Live</span>'
        : '<span class="badge upcoming">Upcoming</span>';

    const gameId = g.game_id || '';
    const sport  = document.getElementById('sportSelect').value;

    return `
      <div class="game-card">
        <div class="game-meta">
          <span>${g.game_date || ''} ${g.game_time || ''}</span>
          ${badge}
        </div>
        <div class="teams">
          <div class="team-row">
            <span class="team-name ${awayWon ? 'winner' : ''}">${g.away_team || 'Away'}</span>
            <span class="team-score">${g.away_score ?? '—'}</span>
          </div>
          <div class="team-row">
            <span class="team-name ${homeWon ? 'winner' : ''}">${g.home_team || 'Home'}</span>
            <span class="team-score">${g.home_score ?? '—'}</span>
          </div>
        </div>
        ${isFinal && gameId ? `
          <button class="recap-btn" onclick="loadRecap(this, '${gameId}', '${escHtml(g)}', '${sport}')">
            ✦ AI Recap
          </button>
          <div class="recap-text" id="recap-${gameId}" style="display:none"></div>
        ` : ''}
      </div>
    `;
  }

  // ─── AI Recap Loader ────────────────────────────────────────────────────────
  async function loadRecap(btn, gameId, gameJson, sport) {
    const recapDiv = document.getElementById(`recap-${gameId}`);
    if (recapDiv.style.display !== 'none') {
      recapDiv.style.display = 'none';
      btn.textContent = '✦ AI Recap';
      return;
    }

    btn.textContent = 'Loading…';
    btn.disabled = true;

    try {
      // Determine winner/loser from scores
      const g     = JSON.parse(decodeURIComponent(gameJson));
      const awayW = g.away_winner;
      const winner = awayW ? g.away_team : g.home_team;
      const loser  = awayW ? g.home_team : g.away_team;
      const ws     = awayW ? g.away_score : g.home_score;
      const ls     = awayW ? g.home_score : g.away_score;

      const params = new URLSearchParams({
        game_id: gameId,
        sport,
        winner: winner || '',
        loser:  loser  || '',
        winner_score: String(ws ?? ''),
        loser_score:  String(ls ?? ''),
        status: g.status || 'Final',
        conference: g.conference || '',
        date: g.game_date || '',
      });

      const res  = await fetch(`${API_BASE}/api/recap?${params}`);
      const data = await res.json();

      if (data.recap) {
        recapDiv.textContent = data.recap;
        recapDiv.style.display = 'block';
        btn.textContent = '▲ Hide Recap';
      } else {
        btn.textContent = '✦ AI Recap';
      }
    } catch (_) {
      btn.textContent = '✦ AI Recap';
    } finally {
      btn.disabled = false;
    }
  }

  // ─── Standings ──────────────────────────────────────────────────────────────
  async function loadStandings(main, sport, div) {
    const params = new URLSearchParams({ sport, div });
    const res  = await fetch(`${API_BASE}/api/standings?${params}`);
    const data = await res.json();

    main.innerHTML = `
      <h2>Standings · ${formatSport(sport)}</h2>
      <div class="standings-wrap">
        <div class="empty">Standings data available — connect conference data feed to populate table.</div>
      </div>
    `;
  }

  // ─── Helpers ────────────────────────────────────────────────────────────────
  function formatSport(s) {
    return {
      'basketball-men':   "Men's Basketball",
      'basketball-women': "Women's Basketball",
      'football':         'Football',
    }[s] || s;
  }

  function escHtml(g) {
    return encodeURIComponent(JSON.stringify(g));
  }

  // ─── Init ───────────────────────────────────────────────────────────────────
  loadData();
</script>

</body>
</html>
